<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - FreshCart</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        .checkout-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
            margin-top: 20px;
        }

        @media(max-width: 900px) {
            .checkout-grid {
                grid-template-columns: 1fr;
            }
        }

        .checkout-card {
            background: var(--surface-color);
            border-radius: var(--border-radius);
            padding: 30px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 24px;
        }

        .checkout-title {
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .payment-methods {
            display: grid;
            gap: 15px;
        }

        .payment-method {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .payment-method:hover, .payment-method.active {
            border-color: var(--primary-color);
            background: rgba(16, 185, 129, 0.05);
        }

        .payment-icon {
            font-size: 24px;
            color: var(--primary-color);
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: var(--text-secondary);
        }

        .summary-item.total {
            color: var(--text-primary);
            font-size: 18px;
            font-weight: 700;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
            margin-top: 15px;
        }

        .checkout-cart-items {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 10px;
        }

        .mini-cart-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--bg-color);
        }

        .mini-cart-item img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }
        
        .mini-cart-info {
            flex: 1;
        }
        
        .mini-cart-title {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .mini-cart-price {
            color: var(--primary-color);
            font-weight: 600;
        }

        /* Success Overlay */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255,255,255,0.95);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s;
        }
        
        .success-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .success-icon {
            font-size: 80px;
            color: var(--primary-color);
            margin-bottom: 20px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon"><ion-icon name="basket-outline"></ion-icon></div>
                FreshCart
            </a>
            <div class="nav-actions">
                <a href="index.html" class="nav-link">Continue Shopping</a>
            </div>
        </div>
    </nav>

    <main class="main-content container">
        <div class="checkout-grid fade-in">
            
            <!-- Forms Side -->
            <div class="checkout-forms">
                <!-- Shipping Address -->
                <div class="checkout-card">
                    <h2 class="checkout-title"><ion-icon name="location"></ion-icon> Delivery Address</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">First Name</label>
                            <input type="text" id="firstNameInput" class="form-input" placeholder="John" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Last Name</label>
                            <input type="text" id="lastNameInput" class="form-input" placeholder="Doe" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Email Address (For Confirmation)</label>
                            <input type="email" id="emailInput" class="form-input" placeholder="email@domain.com" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" id="phoneInput" class="form-input" placeholder="+91 9876543210" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Full Address / Flat no.</label>
                        <input type="text" id="addressInput" class="form-input" placeholder="123 Shopping Street, Area Name" required>
                    </div>
                    <div class="form-group" style="max-width: 50%;">
                        <label class="form-label">Pin Code</label>
                        <input type="text" id="pincodeInput" class="form-input" placeholder="400001" required>
                    </div>
                </div>

                <!-- Payment Method -->
                <div class="checkout-card">
                    <h2 class="checkout-title"><ion-icon name="card"></ion-icon> Payment Method</h2>
                    <div class="payment-methods">
                        
                        <label class="payment-method active">
                            <input type="radio" name="payment" value="upi" checked>
                            <div class="payment-icon"><ion-icon name="qr-code-outline"></ion-icon></div>
                            <div>
                                <div style="font-weight: 600;">UPI (Google Pay, PhonePe, Paytm)</div>
                                <div style="font-size: 13px; color: var(--text-secondary);">Pay fast via UPI App</div>
                            </div>
                        </label>

                        <label class="payment-method">
                            <input type="radio" name="payment" value="card">
                            <div class="payment-icon"><ion-icon name="card-outline"></ion-icon></div>
                            <div>
                                <div style="font-weight: 600;">Credit / Debit Card</div>
                                <div style="font-size: 13px; color: var(--text-secondary);">Visa, MasterCard, RuPay</div>
                            </div>
                        </label>

                        <label class="payment-method">
                            <input type="radio" name="payment" value="cod">
                            <div class="payment-icon"><ion-icon name="cash-outline"></ion-icon></div>
                            <div>
                                <div style="font-weight: 600;">Cash on Delivery (COD)</div>
                                <div style="font-size: 13px; color: var(--text-secondary);">Pay when you receive the order</div>
                            </div>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Order Summary Side -->
            <div class="checkout-summary">
                <div class="checkout-card" style="position: sticky; top: 100px;">
                    <h2 class="checkout-title"><ion-icon name="receipt"></ion-icon> Order Summary</h2>
                    
                    <div class="checkout-cart-items" id="checkoutCartItems">
                        <!-- Populated by JS -->
                    </div>

                    <div class="summary-item">
                        <span>Subtotal</span>
                        <span id="summarySubtotal">₹0</span>
                    </div>
                    <div class="summary-item">
                        <span>Delivery Fee</span>
                        <span>₹40</span>
                    </div>
                    <div class="summary-item">
                        <span>Tax</span>
                        <span id="summaryTax">₹0</span>
                    </div>
                    <div class="summary-item total">
                        <span>Total to Pay</span>
                        <span id="summaryTotal">₹0</span>
                    </div>

                    <!-- Alert message container -->
                    <div id="checkoutAlertContainer" style="display: none; padding: 12px; border-radius: 8px; font-size: 14px; margin-top: 15px; margin-bottom: 5px; font-weight: 500; text-align: left;"></div>

                    <button id="placeOrderBtn" class="btn-primary" style="width: 100%; margin-top: 20px; font-size: 16px; padding: 16px;" onclick="placeOrder()">Place Order</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Success Output -->
    <div class="success-overlay" id="successOverlay">
        <ion-icon name="checkmark-circle" class="success-icon"></ion-icon>
        <h1 style="font-size: 36px; margin-bottom: 10px; font-family: Outfit;">Order Placed Successfully!</h1>
        <p id="orderIdDisplay" style="color: var(--text-secondary); margin-bottom: 30px; font-size: 18px;">Your groceries are on the way. Order ID: #ORD-9824X</p>
        <a href="delivery.html"><button class="btn-primary" style="padding: 14px 30px; font-size: 16px;">Track Your Order</button></a>
    </div>

    <script src="js/app.js"></script>
    <script>
        const IS_PRODUCTION = window.location.hostname.includes('localhost') || 
                              window.location.hostname.includes('127.0.0.1') ? false : true;
        const PRODUCTION_API_URL = "https://freshcart-dewk.onrender.com"; 
        const API_BASE = IS_PRODUCTION ? PRODUCTION_API_URL : 'http://localhost:5000';

        const alertContainer = document.getElementById('checkoutAlertContainer');

        function showAlert(message, type) {
            alertContainer.style.display = 'block';
            alertContainer.innerText = message;
            if (type === 'success') {
                alertContainer.style.background = '#d1fae5';
                alertContainer.style.color = '#065f46';
                alertContainer.style.border = '1px solid #10b981';
            } else {
                alertContainer.style.background = '#fee2e2';
                alertContainer.style.color = '#991b1b';
                alertContainer.style.border = '1px solid #ef4444';
            }
        }

        function hideAlert() {
            alertContainer.style.display = 'none';
        }

        // Custom logic for checkout page
        document.addEventListener('DOMContentLoaded', () => {
            const storedCart = JSON.parse(localStorage.getItem('cart')) || [];
            const container = document.getElementById('checkoutCartItems');
            const getImagePath = (imagePath) => {
                if (typeof resolveImagePath === 'function') {
                    return resolveImagePath(imagePath);
                }
                return imagePath;
            };
            
            if(storedCart.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding: 20px;">Your cart is empty.</p>';
                return;
            }

            let subtotal = 0;
            storedCart.forEach(item => {
                subtotal += item.price * item.quantity;
                container.innerHTML += `
                    <div class="mini-cart-item">
                        <img src="${getImagePath(item.image)}" alt="${item.name}" loading="lazy">
                        <div class="mini-cart-info">
                            <div class="mini-cart-title">${item.name}</div>
                            <div style="font-size: 12px; color: var(--text-secondary);">Qty: ${item.quantity}</div>
                        </div>
                        <div class="mini-cart-price">₹${item.price * item.quantity}</div>
                    </div>
                `;
            });

            const tax = Math.round(subtotal * 0.05); // 5% mock tax
            const delivery = 40;
            const total = subtotal + tax + delivery;

            document.getElementById('summarySubtotal').innerText = `₹${subtotal}`;
            document.getElementById('summaryTax').innerText = `₹${tax}`;
            document.getElementById('summaryTotal').innerText = `₹${total}`;

            // Pre-fill user details if logged in
            const loggedInUser = JSON.parse(localStorage.getItem('user'));
            if (loggedInUser) {
                if (loggedInUser.email) {
                    document.getElementById('emailInput').value = loggedInUser.email;
                }
                if (loggedInUser.name) {
                    const nameParts = loggedInUser.name.trim().split(' ');
                    document.getElementById('firstNameInput').value = nameParts[0] || '';
                    if (nameParts.length > 1) {
                        document.getElementById('lastNameInput').value = nameParts.slice(1).join(' ');
                    }
                }
            }

            // Add highlight on selected payment row
            const paymentOptions = document.querySelectorAll('.payment-method');
            paymentOptions.forEach(opt => {
                opt.addEventListener('click', function() {
                    paymentOptions.forEach(o => o.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        });

        async function placeOrder() {
            hideAlert();

            const firstName = document.getElementById('firstNameInput').value.trim();
            const lastName = document.getElementById('lastNameInput').value.trim();
            const email = document.getElementById('emailInput').value.trim();
            const phone = document.getElementById('phoneInput').value.trim();
            const address = document.getElementById('addressInput').value.trim();
            const pincode = document.getElementById('pincodeInput').value.trim();
            const paymentMethod = document.querySelector('input[name="payment"]:checked')?.value || 'upi';

            // Validations
            if (!firstName || !lastName || !email || !phone || !address || !pincode) {
                showAlert("Please fill out all the delivery details.", "error");
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showAlert("Please enter a valid email address.", "error");
                return;
            }

            const storedCart = JSON.parse(localStorage.getItem('cart')) || [];
            if (storedCart.length === 0) {
                showAlert("Your cart is empty. Please add items to your cart first.", "error");
                return;
            }

            // Calculations
            let subtotal = 0;
            storedCart.forEach(item => {
                subtotal += item.price * item.quantity;
            });
            const tax = Math.round(subtotal * 0.05);
            const delivery = 40;
            const totalPrice = subtotal + tax + delivery;

            // Prepare API payload
            const loggedInUser = JSON.parse(localStorage.getItem('user'));
            const userId = loggedInUser ? loggedInUser.id : null;

            const items = storedCart.map(item => ({
                name: item.name,
                price: Number(item.price),
                quantity: Number(item.quantity)
            }));

            const shippingAddress = `${firstName} ${lastName}, ${address}, Pin: ${pincode}, Phone: ${phone}`;

            const payload = {
                userId,
                email,
                items,
                totalPrice,
                shippingAddress,
                paymentMethod
            };

            // Loading state
            const btn = document.getElementById('placeOrderBtn');
            btn.disabled = true;
            const originalBtnText = btn.innerText;
            btn.innerText = "Placing Order...";

            try {
                const res = await fetch(`${API_BASE}/api/orders/place`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                if (res.ok) {
                    // Update overlay text
                    document.getElementById('orderIdDisplay').innerHTML = `Your groceries are on the way. Order ID: <strong>#${data.order.orderId}</strong>`;
                    // Clear cart memory
                    localStorage.removeItem('cart');
                    // Show Success UI
                    document.getElementById('successOverlay').classList.add('show');
                } else {
                    showAlert(data.message || "Failed to place order. Please try again.", "error");
                    btn.disabled = false;
                    btn.innerText = originalBtnText;
                }
            } catch (err) {
                console.error("[Checkout] Order placement failed:", err);
                showAlert("Network connection error. Check if the server is running.", "error");
                btn.disabled = false;
                btn.innerText = originalBtnText;
            }
        }
    </script>
</body>
</html>
